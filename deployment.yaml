apiVersion: apps/v1
kind: Deployment
metadata:
  name: moviesentiment
  namespace: default
  labels:
    app: moviesentiment
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: moviesentiment
  template:
    metadata:
      labels:
        app: moviesentiment
    spec:
      containers:
        - name: moviesentiment
          image: 033040503691.dkr.ecr.eu-north-1.amazonaws.com/capstone-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: FLASK_APP_LOAD_DOTENV
              value: "false"
            - name: FLASK_APP_EAGER_STARTUP
              value: "true"
            - name: FLASK_APP_PRELOAD_MOVIES
              value: "true"
            - name: WATCHMODE_REGION
              value: "US"
            - name: MOVIE_CATALOG_LIMIT
              value: "20"
            - name: MLFLOW_MODEL_NAME
              value: "sentiment-classifier"
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MLFLOW_TRACKING_URI
            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MLFLOW_TRACKING_USERNAME
            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MLFLOW_TRACKING_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: "eu-north-1"
            - name: WATCHMODE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: WATCHMODE_API_KEY
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: moviesentiment-service
  namespace: default
  labels:
    app: moviesentiment
spec:
  selector:
    app: moviesentiment
  ports:
    - name: http
      port: 80
      targetPort: http
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: moviesentiment
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: moviesentiment
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
