name: atlas
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13.5
  - pip
  - pip:
      - -e .
      - click
      - Sphinx
      - coverage
      - awscli
      - flake8
      - python-dotenv>=0.5.1
      - jupyter
      - ipykernel
      - numpy
      - pandas
      - scipy
      - scikit-learn
      - nltk
      - xgboost
      - mlflow
      - dagshub
